# Financial Multi-Agent System — full local stack (100% open source)
# Start: docker compose up -d
# Init data: docker compose run --rm data-init

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finagent_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-financial_gold}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finagent -d financial_gold"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/init_kafka_topics.sh:/init_kafka_topics.sh:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    entrypoint: ["/bin/bash", "/init_kafka_topics.sh"]
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 20

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"
      - "5000:5000/tcp"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  dlp-agent:
    build:
      context: .
      dockerfile: services/dlp_agent/Dockerfile
    ports:
      - "8001:8001"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  text-to-sql-agent:
    build:
      context: .
      dockerfile: services/text_to_sql_agent/Dockerfile
    ports:
      - "8002:8002"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finagent_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-financial_gold}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-agent:
    build:
      context: .
      dockerfile: services/rag_agent/Dockerfile
    ports:
      - "8003:8003"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-faq_policies}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data/docs:/app/data/docs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DLP_AGENT_URL: http://dlp-agent:8001
      TEXT_TO_SQL_AGENT_URL: http://text-to-sql-agent:8002
      RAG_AGENT_URL: http://rag-agent:8003
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RESPONSES: agent.responses
      KAFKA_TOPIC_DLQ: agent.requests.dlq
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: "true"
      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-300}
      REDIS_RATE_LIMIT_PER_MINUTE: ${REDIS_RATE_LIMIT_PER_MINUTE:-30}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      dlp-agent:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      sql-worker:
        condition: service_healthy
      rag-worker:
        condition: service_healthy
      dlp-worker:
        condition: service_healthy
      fallback-worker:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Intent-specific Kafka workers (scale with: docker compose up --scale sql-worker=2) ---
  x-worker-env: &worker-env
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_TOPIC_RESPONSES: agent.responses
    KAFKA_TOPIC_DLQ: agent.requests.dlq
    TEXT_TO_SQL_AGENT_URL: http://text-to-sql-agent:8002
    RAG_AGENT_URL: http://rag-agent:8003
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_ENABLED: "true"
    REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-300}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}

  sql-worker:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    environment:
      <<: *worker-env
      WORKER_INTENT: text_to_sql
      WORKER_PORT: 8011
    ports:
      - "8011:8011"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      text-to-sql-agent:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-worker:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    environment:
      <<: *worker-env
      WORKER_INTENT: faq_rag
      WORKER_PORT: 8012
    ports:
      - "8012:8012"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      rag-agent:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dlp-worker:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    environment:
      <<: *worker-env
      WORKER_INTENT: dlp_only
      WORKER_PORT: 8013
    ports:
      - "8013:8013"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  fallback-worker:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    environment:
      <<: *worker-env
      WORKER_INTENT: fallback
      WORKER_PORT: 8014
    ports:
      - "8014:8014"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: services/mcp_server/Dockerfile
    ports:
      - "8020:8020"
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      DLP_AGENT_URL: http://dlp-agent:8001
      TEXT_TO_SQL_AGENT_URL: http://text-to-sql-agent:8002
      RAG_AGENT_URL: http://rag-agent:8003
      MCP_SERVER_PORT: 8020
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      orchestrator:
        condition: service_healthy

  data-init:
    build:
      context: .
      dockerfile: scripts/Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finagent_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-financial_gold}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-faq_policies}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    profiles:
      - init

volumes:
  postgres_data:
  qdrant_data:
  zookeeper_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  redis_data:
