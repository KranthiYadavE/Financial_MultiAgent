apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-worker
  namespace: financial-agents
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sql-worker
  template:
    metadata:
      labels:
        app: sql-worker
    spec:
      containers:
        - name: sql-worker
          image: ghcr.io/kranthiyadave/financial-multiagent/sql-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8011
          envFrom:
            - configMapRef:
                name: agent-config
          env:
            - name: WORKER_INTENT
              value: text_to_sql
            - name: WORKER_PORT
              value: "8011"
            - name: TEXT_TO_SQL_AGENT_URL
              value: http://text-to-sql-agent:8002
            - name: RAG_AGENT_URL
              value: http://rag-agent:8003
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sql-worker
  namespace: financial-agents
spec:
  selector:
    app: sql-worker
  ports:
    - port: 8011
      targetPort: 8011
