apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: financial-agents-ingress
  namespace: financial-agents
  annotations:
    # For minikube: minikube addons enable ingress
    # For nginx-ingress controller
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
spec:
  ingressClassName: nginx
  rules:
    - host: financial-agents.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestrator
                port:
                  number: 8000
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: mcp-server
                port:
                  number: 8020
