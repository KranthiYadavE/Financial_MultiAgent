input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [correlation_id] {
    mutate { add_field => { "[@metadata][correlation]" => "%{correlation_id}" } }
  }
  if [service] {
    mutate { add_field => { "agent_service" => "%{service}" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "financial-agents-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
